name: build-x86-64-immortalwrt-daily-release # 更改Workflow的名称以反映其功能

on:
  workflow_dispatch:
    inputs:
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '1024'
      include_docker:
        description: |
          是否编译 Docker 插件
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置PPPoE拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
        - 'yes'
        - 'no'
      pppoe_account:
        description: "宽带账号 (若启用PPPoE)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用PPPoE)"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build24.sh

      # --- 新增步骤：获取当前日期并格式化 ---
      - name: Get current date and format
        id: date_step # 步骤ID
        run: |
          # 获取当前日期，格式为 YYYY.M.D (例如: 2025.8.4)
          BUILD_DATE=$(date +'%Y.%-m.%-d')
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV # 设置为环境变量，供后续步骤使用
          echo "date=$BUILD_DATE" >> "$GITHUB_OUTPUT" # 也设置为步骤输出，兼容旧语法

      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ inputs.pppoe_account }}" || -z "${{ inputs.pppoe_password }}" ]]; then
              echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
              exit 1
            fi
          fi

      - name: Build ImmortalWrt-x86-64-efi
        run: |
          profiles="${{ github.event.inputs.profile }}"
          include_docker="${{ github.event.inputs.include_docker }}"
          IFS=',' read -r -a profile_array <<< "$profiles"
          
          for profile in "${profile_array[@]}"; do
            echo "Building for profile: $profile"
            
            docker run --rm -i \
              --user root \
              -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
              -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
              -v "${{ github.workspace }}/x86-64/imm.config:/home/build/immortalwrt/.config" \
              -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
              -v "${{ github.workspace }}/x86-64/build24.sh:/home/build/immortalwrt/build.sh" \
              -e PROFILE=$profile \
              -e INCLUDE_DOCKER=$include_docker \
              -e ENABLE_PPPOE=${{ inputs.enable_pppoe }} \
              -e PPPOE_ACCOUNT=${{ inputs.pppoe_account }} \
              -e PPPOE_PASSWORD=${{ inputs.pppoe_password }} \
              immortalwrt/imagebuilder:x86-64-openwrt-24.10.2 /bin/bash /home/build/immortalwrt/build.sh
          done

      # --- 修改 Create info 步骤，加入日期信息 ---
      - name: Create info
        run: |
          # 初始化 info.md 文件
          echo "### ImmortWrt Build Information" > ${{ github.workspace }}/info.md
          echo "Build Date: ${{ env.BUILD_DATE }}" >> ${{ github.workspace }}/info.md
          echo "" >> ${{ github.workspace }}/info.md # 添加空行

          if [ "${{ github.event.inputs.include_docker }}" == "yes" ]; then
            echo "#### 默认带docker" >> ${{ github.workspace }}/info.md
          else
            echo "#### 不带docker" >> ${{ github.workspace }}/info.md
          fi

      # --- 新增步骤：定位构建文件并准备新文件名 ---
      - name: Locate built file and prepare new name
        id: locate_file # 步骤ID，以便在Upload步骤中引用
        run: |
          # 查找实际的固件文件路径
          # 我们假设只有一个符合模式的文件，并且位于 ${{ github.workspace }}/bin/targets/x86/64/
          FIRMWARE_SEARCH_PATH="${{ github.workspace }}/bin/targets/x86/64/"
          FIRMWARE_PATH=$(find "$FIRMWARE_SEARCH_PATH" -name "*squashfs-combined-efi.img.gz" -print -quit)

          if [ -z "$FIRMWARE_PATH" ]; then
            echo "Error: Firmware file not found in $FIRMWARE_SEARCH_PATH with pattern *squashfs-combined-efi.img.gz!"
            exit 1
          fi

          # 提取原始文件的扩展名（例如 .img.gz）
          # cut -d'.' -f1-2 | rev 确保获取完整的 ".img.gz" 后缀
          FILE_EXTENSION=".$(basename "$FIRMWARE_PATH" | rev | cut -d'.' -f1-2 | rev)"
          # Fallback: 如果不是预期的 .img.gz，则默认 .bin
          if [[ "$FILE_EXTENSION" != ".img.gz" && "$FILE_EXTENSION" != ".bin" ]]; then
              FILE_EXTENSION=".bin"
          fi

          # 构建新的文件名：ImmortWrt YYYY.M.D.img.gz
          NEW_ASSET_NAME="ImmortWrt ${{ env.BUILD_DATE }}${FILE_EXTENSION}"

          echo "Detected firmware path: $FIRMWARE_PATH"
          echo "New asset name will be: $NEW_ASSET_NAME"

          echo "FIRMWARE_PATH=$FIRMWARE_PATH" >> "$GITHUB_OUTPUT"
          echo "NEW_ASSET_NAME=$NEW_ASSET_NAME" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload ImmortWrt as release assets
        uses: softprops/action-gh-release@v2.2.1
        with:
          # `tag_name` 用于实际的 Git Tag。对于 `workflow_dispatch` 触发，`action-gh-release` 会创建这个 tag。
          # 建议使用不含空格的格式，如 ImmortWrt-2025.8.4
          tag_name: ImmortWrt-${{ env.BUILD_DATE }} 
          # `name` 字段是 Release 在 GitHub 页面上会显示的名称，可以使用您希望的带空格的格式
          name: ImmortWrt ${{ env.BUILD_DATE }}
          body_path: ${{ github.workspace }}/info.md
          # 文件路径和新文件名之间用 `->` 连接，且不能有注释
          files: |
            ${{ steps.locate_file.outputs.FIRMWARE_PATH }}->${{ steps.locate_file.outputs.NEW_ASSET_NAME }}
          draft: false # 是否发布为草稿
          prerelease: false # 是否发布为预发布版本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GITHUB_TOKEN 通常直接在 Action 的 `env` 或 `with` 中传递
